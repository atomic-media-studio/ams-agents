<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ARP Platform</title>
  <link rel="stylesheet" href="/ui/styles.css" />
</head>
<body>
  <main class="wrap">
    <section class="top">
      <p class="eyebrow">ARPSCI-Ecosystem Platform</p>
      <h1>Ecosystem Dashboard</h1>
      <p class="subtitle">FastAPI frontend for host-runner app control.</p>
    </section>

    <section class="grid">
      <article class="card">
        <h2>Platform</h2>
        <div class="row"><span class="k">Service</span><span id="platformService" class="v">-</span></div>
        <div class="row"><span class="k">Status</span><span id="platformStatus" class="v">-</span></div>
        <div class="row"><span class="k">Time</span><span id="platformTime" class="v mono">-</span></div>
        <div class="actions">
          <button id="refreshBtn" type="button">Refresh</button>
        </div>
      </article>

      <article class="card">
        <h2>Rust App Runtime</h2>
        <div class="row"><span class="k">Process</span><span id="rustProcStatus" class="v">-</span></div>
        <div class="row"><span class="k">PID</span><span id="rustProcPid" class="v mono">-</span></div>
        <div class="row"><span class="k">Target Dir</span><span id="rustTargetDir" class="v mono">-</span></div>
        <div class="actions">
          <button id="rustStartBtn" type="button">Start App</button>
          <button id="rustStopBtn" type="button">Stop App</button>
        </div>
      </article>

      <article class="card">
        <h2>Rust Build</h2>
        <div class="row"><span class="k">Compile Status</span><span id="rustCompileStatus" class="v">-</span></div>
        <div class="actions">
          <button id="rustCompileBtn" type="button">Compile ams-agents</button>
        </div>
        <div id="rustLog" class="log mono"></div>
      </article>
    </section>
  </main>
  <script src="/ui/app.js"></script>
</body>
</html>
