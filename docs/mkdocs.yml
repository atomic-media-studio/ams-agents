site_name: ARPSCI Docs
site_description: Documentation for ARPSCI platforms and applications.
docs_dir: src

theme:
  name: material
  palette:
    scheme: default
    primary: custom
    accent: custom
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - content.code.copy
    - toc.follow

extra_css:
  - overrides/extra.css

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: ["../platform/src"]
          options:
            show_source: false
            show_root_heading: true
            heading_level: 3

nav:
  - Overview: index.md
  - Architecture: architecture.md
  - API Reference:
    - Platform API: api/platform.md
    - Host Runner API: api/host-runner.md
    - OpenAPI Explorer: api/openapi.md
