version: "3.9"

services:
  platform:
    build:
      context: .
      dockerfile: platform/Dockerfile
    environment:
      ARP_PLATFORM_HOST: 0.0.0.0
      ARP_PLATFORM_PORT: 8080
      ARP_ROCKET_BASE_URL: http://host.docker.internal:8000
      ARP_ROCKET_TIMEOUT_SECONDS: 10.0
      ARP_RUST_APP_RUNNER_BASE_URL: http://host.docker.internal:8090
      ARP_RUST_APP_RUNNER_TIMEOUT_SECONDS: 30.0
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8080:8080"

  docs:
    build:
      context: .
      dockerfile: docs/Dockerfile
    ports:
      - "8081:80"
